<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fan-Sim Pro — 시로코 팬 통합 설계 도구</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: #ffffff; overflow-x: hidden; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh;
      color: #6b7280; font-family: monospace; font-size: 14px; flex-direction: column; gap: 8px; }
    .spinner { width: 24px; height: 24px; border: 2px solid #e5e7eb;
      border-top: 2px solid #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tool-switcher { position: fixed; top: 8px; right: 8px; z-index: 999; display: flex; gap: 4px; }
    .tool-btn { padding: 4px 10px; border-radius: 4px; border: 1px solid #e5e7eb; background: #f8f9fa;
      color: #6b7280; font-family: monospace; font-size: 10px; cursor: pointer; }
    .tool-btn.active { color: #2563eb; border-color: #2563eb; }
  </style>
</head>
<body>
  <div class="tool-switcher">
    <button class="tool-btn active" onclick="loadTool('impeller-3d-viewer')">3D Design</button>
    <button class="tool-btn" onclick="loadTool('fan-sim-pro')">PQ Analysis</button>
  </div>
  <div id="root">
    <div id="loading">
      <div class="spinner"></div>
      <span>Fan-Sim Pro 로딩 중...</span>
    </div>
  </div>

  <script>
    const { useState, useMemo, useCallback, useEffect, useRef } = React;

    function loadTool(name) {
      // Update button states
      document.querySelectorAll('.tool-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.includes(name === 'impeller-3d-viewer' ? '3D' : 'PQ'));
      });

      document.getElementById('root').innerHTML = '<div id="loading"><div class="spinner"></div><span>로딩 중...</span></div>';

      fetch('/static/' + name + '.jsx?v=' + Date.now())
        .then(r => r.text())
        .then(jsx => {
          const prefix = `const { useState, useMemo, useCallback, useEffect, useRef } = React;\n`;
          const code = prefix + jsx
            .replace(/^import\s+\{[^}]*\}\s+from\s+["']react["'];?\s*$/gm, '')
            .replace(/^import\s+\*\s+as\s+THREE\s+from\s+["']three["'];?\s*$/gm, '')
            .replace(/^import\s+.*$/gm, '')
            .replace(/^export\s+default\s+/m, 'const __Component__ = ');

          const transformed = Babel.transform(code, {
            presets: ['react'],
            filename: name + '.jsx'
          }).code;

          const fn = new Function('React', 'ReactDOM', 'THREE', transformed + '\nreturn __Component__;');
          const Component = fn(React, ReactDOM, THREE);
          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(React.createElement(Component));
        })
        .catch(err => {
          document.getElementById('root').innerHTML =
            '<div id="loading"><span style="color:#ff6666">로딩 실패: ' + err.message + '</span></div>';
          console.error(err);
        });
    }

    // Auto-load default tool
    loadTool('impeller-3d-viewer');
  </script>
</body>
</html>
