<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fan-Sim Pro — 시로코 팬 통합 설계 도구</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
  /* ═══ Compressor-sim 통일 디자인 시스템 ═══ */
  :root {
    --bg: #ffffff; --bg2: #f8f9fa; --bg3: #f0f1f3;
    --tx: #1a1a1a; --tx2: #6b7280; --tx3: #9ca3af;
    --bd: #e5e7eb; --bd2: #d1d5db;
    --accent: #2563eb; --purple: #7c3aed;
    --ok: #059669; --ok-bg: #ecfdf5;
    --warn: #d97706; --warn-bg: #fffbeb;
    --err: #dc2626; --err-bg: #fef2f2;
    --font: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'Consolas', 'SF Mono', monospace;
    --r: 8px; --rl: 12px;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#1a1a2e;--bg2:#16213e;--bg3:#0f1629;
    --tx:#e2e8f0;--tx2:#94a3b8;--tx3:#64748b;
    --bd:#2a3650;--bd2:#334155;
    --ok-bg:#064e3b;--warn-bg:#78350f;--err-bg:#7f1d1d;
  }}
  *{box-sizing:border-box;margin:0;padding:0;font-family:var(--font)}
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
  input[type=number]{-moz-appearance:textfield;font-family:var(--font)}
  select,textarea,button{font-family:var(--font)}
  html,body{height:100%;background:var(--bg3)}
  body { margin: 0; overflow-x: hidden; }
  #loading { display: flex; align-items: center; justify-content: center; height: 100vh;
    color: var(--tx2); font-size: 14px; flex-direction: column; gap: 8px; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--bd);
    border-top: 2px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* App shell */
  .app{display:flex;flex-direction:column;height:100vh;background:var(--bg);overflow:hidden}

  /* Header */
  .hdr{display:flex;align-items:center;gap:16px;padding:10px 24px;border-bottom:1px solid var(--bd);background:var(--bg2);flex-shrink:0}
  .hdr-back{font-size:14px;color:var(--accent);cursor:pointer;text-decoration:none}
  .hdr-name{font-weight:500;font-size:16px;color:var(--tx)}
  .mode-grp{display:flex;gap:4px;margin-left:auto;background:var(--bg3);border-radius:var(--r);padding:4px}
  .mode-btn{font-size:13px;padding:7px 18px;border:none;background:transparent;color:var(--tx2);cursor:pointer;border-radius:6px;transition:all .15s}
  .mode-btn.on{background:var(--bg);color:var(--tx);font-weight:500;box-shadow:0 0 0 1px var(--bd2)}
  .hdr-icons{display:flex;gap:8px;margin-left:16px}
  .hdr-icons button{font-size:14px;width:36px;height:36px;border:1px solid var(--bd);background:transparent;border-radius:var(--r);cursor:pointer;color:var(--tx2);display:flex;align-items:center;justify-content:center}
  .hdr-icons button:hover{background:var(--bg3);color:var(--tx)}

  /* Body */
  .bdy{display:flex;flex:1;min-height:0}

  /* Sidebar */
  .side{width:290px;min-width:290px;border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;background:var(--bg)}
  .ss{padding:16px 18px 12px}
  .st{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
  .ir{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .il{font-size:13px;color:var(--tx2)}
  .nf{width:96px;max-width:45%;text-align:right;font-size:13px;padding:6px 10px;border:1px solid var(--bd);border-radius:6px;background:var(--bg2);color:var(--tx);min-width:0}
  .dv{height:1px;background:var(--bd);margin:6px 0}

  /* Slider row */
  .sr{margin-bottom:10px}
  .sr-t{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:6px;min-width:0}
  .sr-l{font-size:13px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1}
  .sr-i{width:68px;max-width:50%;text-align:right;font-size:12px;padding:4px 8px;border:1px solid var(--bd);border-radius:5px;background:var(--bg2);color:var(--tx);min-width:0;flex-shrink:0}
  .sr input[type=range]{width:100%;cursor:pointer;min-width:0}

  /* Sidebar bottom */
  .sb{padding:14px 18px;border-top:1px solid var(--bd);margin-top:auto}
  .solve-btn{width:100%;padding:11px 0;font-size:14px;font-weight:500;border:none;background:var(--accent);color:#fff;border-radius:var(--r);cursor:pointer}

  /* Main */
  .mn{flex:1;display:flex;flex-direction:column;min-width:0}

  /* Tabs */
  .tabs{display:flex;align-items:center;border-bottom:1px solid var(--bd);padding:0 24px;gap:6px;background:var(--bg2);flex-shrink:0}
  .tab{font-size:14px;padding:13px 20px;border:none;background:transparent;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s}
  .tab.on{color:var(--tx);font-weight:500;border-bottom-color:var(--accent)}

  /* Viewport */
  .vp{flex:1;padding:20px 24px;overflow-y:auto}
  .vg{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .vc{border:1px solid var(--bd);border-radius:var(--rl);padding:16px;background:var(--bg2)}
  .vt{font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:12px}
  .full{grid-column:1/-1}

  /* Status bar */
  .sbar{font-size:12px;color:var(--tx3);padding:6px 24px;border-top:1px solid var(--bd);background:var(--bg2);display:flex;gap:20px;flex-shrink:0}

  /* KPI bar */
  .kpi-bar{display:flex;border-top:1px solid var(--bd);background:var(--bg2);flex-shrink:0}
  .kpi{flex:1;text-align:center;padding:10px 8px;border-right:1px solid var(--bd)}
  .kpi:last-child{border-right:none}
  .kpi-l{font-size:11px;color:var(--tx3);margin-bottom:3px}
  .kpi-v{font-size:16px;font-weight:500;font-family:var(--mono);color:var(--tx)}
  .kpi-u{font-size:12px;font-weight:400;color:var(--tx2)}

  /* Legacy hpwd-* classes mapped to compressor-sim standard */
  .hpwd-body{display:flex;flex:1;min-height:0}
  .hpwd-main{order:3;flex:1;min-width:0;display:flex;flex-direction:column}
  .hpwd-side{order:1;width:290px;min-width:260px;max-width:600px;border-right:1px solid var(--bd);background:var(--bg);overflow:hidden;flex-shrink:0;display:flex;flex-direction:column}
  .hpwd-side-scroll{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0}
  .hpwd-side-scroll::-webkit-scrollbar{width:8px}
  .hpwd-side-scroll::-webkit-scrollbar-track{background:var(--bg2)}
  .hpwd-side-scroll::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}
  .hpwd-side-scroll::-webkit-scrollbar-thumb:hover{background:var(--tx3)}
  /* Sidebar content containment — all children must not overflow */
  .hpwd-side *{min-width:0}
  /* Prevent 2-col grid in sidebar (too narrow) */
  .hpwd-side .sm\:grid-cols-2{grid-template-columns:1fr !important}
  /* Sidebar inline button groups (재질, BLADE 등) */
  .hpwd-side button{flex-shrink:0}
  /* Compact buttons inside sidebar (override general px-3 py-1.5) */
  .hpwd-side .px-3{padding-left:8px;padding-right:8px}
  .hpwd-side .py-1\.5{padding-top:4px;padding-bottom:4px}
  /* Button groups in sidebar should not overflow */
  .hpwd-side .flex-wrap{flex-wrap:wrap;gap:3px}
  /* Resizer handle (between sidebar and main) */
  .hpwd-resizer{order:2;width:4px;cursor:col-resize;background:transparent;flex-shrink:0;position:relative;z-index:10;transition:background .15s}
  .hpwd-resizer:hover{background:var(--accent)}
  .hpwd-resizer.dragging{background:var(--accent)}
  .hpwd-resizer::before{content:'';position:absolute;inset:0 -3px;cursor:col-resize}

  /* Mobile: stack vertically */
  @media (max-width:1023px){
    .hpwd-body{flex-direction:column}
    .hpwd-main,.hpwd-side{width:100%;min-width:0;order:initial}
    .hpwd-side{border-right:none;border-top:1px solid var(--bd);max-height:none;position:static}
  }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div class="spinner"></div>
      <span>Fan 로딩 중...</span>
    </div>
  </div>

  <script>
    const { useState, useMemo, useCallback, useEffect, useRef } = React;

    function loadTool(name) {
      document.getElementById('root').innerHTML = '<div id="loading"><div class="spinner"></div><span>로딩 중...</span></div>';

      fetch('/static/' + name + '.jsx?v=' + Date.now())
        .then(r => r.text())
        .then(jsx => {
          const prefix = `const { useState, useMemo, useCallback, useEffect, useRef } = React;\n`;
          const code = prefix + jsx
            .replace(/^import\s+\{[^}]*\}\s+from\s+["']react["'];?\s*$/gm, '')
            .replace(/^import\s+\*\s+as\s+THREE\s+from\s+["']three["'];?\s*$/gm, '')
            .replace(/^import\s+.*$/gm, '')
            .replace(/^export\s+default\s+/m, 'const __Component__ = ');

          const transformed = Babel.transform(code, {
            presets: ['react'],
            filename: name + '.jsx'
          }).code;

          const fn = new Function('React', 'ReactDOM', 'THREE', transformed + '\nreturn __Component__;');
          const Component = fn(React, ReactDOM, THREE);
          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(React.createElement(Component));
        })
        .catch(err => {
          document.getElementById('root').innerHTML =
            '<div id="loading"><span style="color:#ff6666">로딩 실패: ' + err.message + '</span></div>';
          console.error(err);
        });
    }

    // Auto-load default tool
    loadTool('impeller-3d-viewer');
  </script>
</body>
</html>
