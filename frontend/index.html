<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fan-Sim Pro — 시로코 팬 통합 설계 도구</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: #0f1923; overflow-x: hidden; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh;
      color: #8899aa; font-family: monospace; font-size: 14px; flex-direction: column; gap: 8px; }
    .spinner { width: 24px; height: 24px; border: 2px solid #334455;
      border-top: 2px solid #66aaff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div class="spinner"></div>
      <span>Fan-Sim Pro 로딩 중...</span>
    </div>
  </div>

  <script>
    // Load JSX component via Babel transform
    fetch('/static/fan-sim-pro.jsx')
      .then(r => r.text())
      .then(jsx => {
        // Prepend React hooks destructuring
        const prefix = `const { useState, useMemo, useCallback, useEffect, useRef } = React;\n`;
        // Remove ES module export
        const code = prefix + jsx
          .replace(/^import\s+.*$/gm, '')
          .replace(/^export\s+default\s+/m, 'const __FanSimPro__ = ');

        // Transform JSX → JS
        const transformed = Babel.transform(code, {
          presets: ['react'],
          filename: 'fan-sim-pro.jsx'
        }).code;

        // Execute and render
        const fn = new Function('React', 'ReactDOM', transformed + '\nreturn __FanSimPro__;');
        const Component = fn(React, ReactDOM);
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(Component));
      })
      .catch(err => {
        document.getElementById('loading').innerHTML =
          `<span style="color:#ff6666">로딩 실패: ${err.message}</span>`;
        console.error(err);
      });
  </script>
</body>
</html>
