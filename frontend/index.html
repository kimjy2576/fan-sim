<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fan Simulator v5.0 — 시로코 팬 1D 시뮬레이터</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
  :root {
    --bg: #ffffff; --bg2: #f8f9fa; --bg3: #f0f1f3;
    --tx: #1a1a1a; --tx2: #6b7280; --tx3: #9ca3af;
    --bd: #e5e7eb; --bd2: #d1d5db;
    --accent: #2563eb; --purple: #7c3aed;
    --ok: #059669; --ok-bg: #ecfdf5;
    --warn: #d97706; --warn-bg: #fffbeb;
    --err: #dc2626; --err-bg: #fef2f2;
    --font: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'Consolas', 'SF Mono', monospace;
    --r: 8px; --rl: 12px;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#1a1a2e;--bg2:#16213e;--bg3:#0f1629;
    --tx:#e2e8f0;--tx2:#94a3b8;--tx3:#64748b;
    --bd:#2a3650;--bd2:#334155;
    --ok-bg:#064e3b;--warn-bg:#78350f;--err-bg:#7f1d1d;
  }}
  *{box-sizing:border-box;margin:0;padding:0;font-family:var(--font)}
  html,body{height:100%;background:var(--bg3)}
  body{margin:0;overflow-x:hidden}
  #loading{display:flex;align-items:center;justify-content:center;height:100vh;
    color:var(--tx2);font-size:14px;flex-direction:column;gap:8px}
  .spinner{width:24px;height:24px;border:2px solid var(--bd);
    border-top:2px solid var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div class="spinner"></div>
      <span>Fan Simulator 로딩 중...</span>
    </div>
  </div>

  <script>
    const { useState, useMemo, useCallback, useEffect, useRef } = React;

    function loadTool(name) {
      document.getElementById('root').innerHTML = '<div id="loading"><div class="spinner"></div><span>로딩 중...</span></div>';

      fetch('/static/' + name + '.jsx?v=' + Date.now())
        .then(r => r.text())
        .then(jsx => {
          const prefix = `const { useState, useMemo, useCallback, useEffect, useRef } = React;\n`;
          const code = prefix + jsx
            .replace(/^import\s+\{[^}]*\}\s+from\s+["']react["'];?\s*$/gm, '')
            .replace(/^import\s+\*\s+as\s+THREE\s+from\s+["']three["'];?\s*$/gm, '')
            .replace(/^import\s+.*$/gm, '')
            .replace(/^export\s+default\s+/m, 'const __Component__ = ');

          const transformed = Babel.transform(code, {
            presets: ['react'],
            filename: name + '.jsx'
          }).code;

          const fn = new Function('React', 'ReactDOM', 'THREE', transformed + '\nreturn __Component__;');
          const Component = fn(React, ReactDOM, THREE);
          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(React.createElement(Component));
        })
        .catch(err => {
          document.getElementById('root').innerHTML =
            '<div id="loading"><span style="color:var(--err)">로딩 실패: ' + err.message + '</span></div>';
          console.error(err);
        });
    }

    loadTool('fan-sim');
  </script>
</body>
</html>
